  <style>
    /* ========================================
       GLOBAL STYLES
       ======================================== */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
    }
    
    /* Loader Styles */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0F172A;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease-out;
    }
    
    .loader-content {
      text-align: center;
    }
    
    .loader-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1E88E5, #28B463);
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 800;
      color: white;
      animation: pulse 1.5s infinite;
    }
    
    .loader-text {
      color: white;
      font-size: 14px;
      letter-spacing: 4px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    
    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }
    
    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #1E88E5, #28B463);
      animation: loading 1.5s infinite;
    }
    
    @keyframes loading {
      100% { left: 100%; }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    /* Scroll Progress */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #1E88E5, #28B463);
      z-index: 10001;
      transition: width 0.1s ease-out;
    }
    
    /* Back to Top Button */
    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      z-index: 99;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    
    .back-to-top {
      background: transparent !important;
      box-shadow: none;
      padding: 0;
    }
    
    .back-to-top.show {
      opacity: 1;
      visibility: visible;
    }
    
    .back-to-top:hover {
      transform: translateY(-5px);
    }
    
    /* Container */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    /* Section Styles */
    .section {
      padding: 100px 0;
    }
    
    @media (max-width: 768px) {
      .section {
        padding: 60px 0;
      }
    }
    
    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }
    
    .section-tag {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #28B463;
      background: rgba(40, 180, 99, 0.1);
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 20px;
    }
    
    .section-title {
      font-size: 42px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: #0F172A;
      margin-bottom: 16px;
    }
    
    @media (max-width: 768px) {
      .section-title {
        font-size: 32px;
      }
    }
    
    .section-subtitle {
      font-size: 18px;
      color: #475569;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* ============================================
       NEW PROJECT CARD LAYOUT - Modern Grid Style
       ============================================ */
    
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }
    
    @media (max-width: 1024px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 640px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Modern Project Card - matches index page style */
    .project-card-modern {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
      border: 1px solid #E2E8F0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .project-card-modern:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 45px rgba(0,0,0,0.1);
      border-color: #28B463;
    }
    
    .project-card-modern .project-image-wrap {
      position: relative;
      overflow: hidden;
      padding-top: 65%;
      background: #f0f4f8;
    }
    
    .project-card-modern .project-image-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .project-card-modern:hover .project-image-wrap img {
      transform: scale(1.05);
    }
    
    .project-card-modern .project-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #28B463;
      color: white;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      z-index: 2;
    }
    
    .project-card-modern .project-body {
      padding: 20px 24px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .project-card-modern .project-title {
      font-size: 19px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 6px;
    }
    
    .project-card-modern .project-location {
      color: #28B463;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
    }
    
    .project-card-modern .project-location i {
      margin-right: 6px;
    }
    
    .project-card-modern .project-desc {
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
      flex: 1;
    }
    
    .project-card-modern .project-footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #E2E8F0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .project-card-modern .project-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #1E88E5;
      background: rgba(30, 136, 229, 0.08);
      padding: 4px 12px;
      border-radius: 50px;
    }
    
    .project-card-modern .project-link {
      color: #28B463;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.3s;
    }
    
    .project-card-modern .project-link:hover {
      gap: 10px;
    }
    
    /* Filter Buttons - styled like index page */
    .filter-btn {
      padding: 10px 28px;
      border-radius: 50px;
      border: 1px solid #E2E8F0;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;

    .filter-btn:hover {

    }
    
    .filter-btn.active {

      border-color: #28B463;
      color: white;
    }
    
    /* Stats Card - matches index page */
    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      transition: all 0.3s;
      border: 1px solid #E2E8F0;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }
    
    .stat-number-lg {
      font-size: 42px;
      font-weight: 800;
      color: #28B463;
      font-family: 'Poppins', sans-serif;
    }
    
    .bg-light {
      background: #F8FAFC;
    }
    
    .text-primary {
      color: #1E88E5;
    }
    
    .text-secondary {
      color: #28B463;
    }
    
    /* Button Primary - matches index */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #28B463;
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(40, 180, 99, 0.3);
      border: none;
      cursor: pointer;
    }
    
    .btn-primary:hover {
      background: #1E7A43;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(40, 180, 99, 0.4);
    }
    
    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 2px solid #28B463;
      color: #28B463;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    .btn-outline:hover {
      background: #28B463;
      color: white;
    }

    /* Gradient background for cards - from index */
    .gradient-bg {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      opacity: 0.6;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    
    .group:hover .gradient-bg {
      opacity: 1;
    }
    
    .gradient-all-colors {
      background: linear-gradient(45deg, 
        #e0f2fe, #bae6fd, #7dd3fc, 
        #d1fae5, #6ee7b7, #34d399, 
        #fef3c7, #e0f2fe
      );
      background-size: 400% 400%;
      animation: gradientMove 20s ease-in-out infinite;
    }
    
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
      100% { background-position: 0% 50%; }
    }

    .group:hover {
      border-color: #34d399;
      box-shadow: 0 20px 25px -5px rgba(52, 211, 153, 0.25), 0 10px 10px -5px rgba(52, 211, 153, 0.08);
    }

    /* Hero banner animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }
  </style>
</head>

    { id: 4, title: "Pharma Cleanroom Facility", category: "pharmaceutical", location: "Hyderabad, India", desc: "Class 100 cleanroom with HEPA filtration, HVAC, and environmental monitoring systems.", img: "/assets/images/P__1.jpg" },
    { id: 5, title: "Auto Manufacturing Plant", category: "infrastructure", location: "Chennai, India", desc: "Complete electrical systems, automation, and robotics integration for automotive assembly line.", img: "/assets/images/P_5.jpg" },
    { id: 6, title: "Commercial Complex MEP", category: "commercial", location: "Delhi, India", desc: "HVAC, fire safety, and electrical systems for 40-story corporate tower.", img: "/assets/images/P_6.jpg" },
    { id: 7, title: "Solar Power Project", category: "industrial", location: "Gujarat, India", desc: "Engineering and installation of 100MW solar photovoltaic plant.", img: "/assets/images/P_7.jpeg" },
    { id: 8, title: "Food Processing Unit", category: "infrastructure", location: "Pune, India", desc: "Hygienic MEP design and installation for food processing facility.", img: "/assets/images/P_8.jpg" },
    { id: 9, title: "Metro Rail Project", category: "industrial", location: "Jakarta, Indonesia", desc: "MEP systems for metro rail extension project including ventilation and fire safety.", img: "/assets/images/P_9.jpg" }
  ];
  
  let visibleProjects = 6;
  
  // Get category display name
  function getCategoryDisplay(category) {
    const map = {
      pharmaceutical: 'Pharma',
      industrial: 'Industrial',
      infrastructure: 'Infra',
      commercial: 'Commercial'
    };
    return map[category] || category.charAt(0).toUpperCase() + category.slice(1);
  }
  
  // Render projects with new card layout
  function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    if (!grid) return;
    
    const activeFilter = document.querySelector('.filter-btn.active')?.getAttribute('data-filter') || 'all';
    const filtered = activeFilter === 'all' ? allProjects : allProjects.filter(p => p.category === activeFilter);
    const visible = filtered.slice(0, visibleProjects);
    
    grid.innerHTML = visible.map(project => `
      <div class="project-card-modern group relative overflow-hidden" data-category="${project.category}">
        <div class="gradient-bg gradient-all-colors"></div>
        <div class="project-image-wrap relative">
          <img src="${project.img}" alt="${project.title}" loading="lazy">
          <span class="project-badge">${getCategoryDisplay(project.category)}</span>
        </div>
        <div class="project-body relative z-10">
          <h3 class="project-title">${project.title}</h3>
          <div class="project-location"><i class="fas fa-map-marker-alt"></i> ${project.location}</div>
          <p class="project-desc">${project.desc}</p>
          <div class="project-footer">
            <span class="project-tag"><i class="fas fa-folder-open mr-1"></i> ${getCategoryDisplay(project.category)}</span>
            <a href="#" class="project-link">View Details <i class="fas fa-arrow-right"></i></a>
          </div>
        </div>
      </div>
    `).join('');
    
    // Hide load more button if no more projects
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) {
      if (visibleProjects >= filtered.length) {
        loadMoreBtn.style.display = 'none';
      } else {
        loadMoreBtn.style.display = 'inline-flex';
      }
    }
  }
  
  // Initialize filters
  function initFilters() {
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        visibleProjects = 6;
        renderProjects();
      });
    });
  }
  
  // Load more projects
  function initLoadMore() {
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) {
      loadMoreBtn.addEventListener('click', () => {
        visibleProjects += 3;
        renderProjects();
      });
    }
  }
  
  // ============================================
  // LOAD COMPONENTS (navbar and footer)
  // ============================================
  
  async function loadComponent(elementId, componentPath) {
    try {
      const response = await fetch(componentPath);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const html = await response.text();
      document.getElementById(elementId).innerHTML = html;
      return true;
    } catch (error) {
      console.error(`Error loading ${componentPath}:`, error);
      return false;
    }
  }
  
  function initNavbar() {
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');
    const header = document.querySelector('.header');
    
    if (header) {
      window.addEventListener('scroll', function() {
        if (window.scrollY > 100) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      });
    }
    
    if (navToggle && navMenu) {
      const newToggle = navToggle.cloneNode(true);
      navToggle.parentNode.replaceChild(newToggle, navToggle);
      
      const newMenu = navMenu.cloneNode(true);
      navMenu.parentNode.replaceChild(newMenu, navMenu);
      
      const finalToggle = document.getElementById('navToggle');
      const finalMenu = document.getElementById('navMenu');
      
      if (finalToggle && finalMenu) {
        finalToggle.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          finalMenu.classList.toggle('active');
          finalToggle.classList.toggle('active');
          document.body.classList.toggle('mobile-nav-active');
        });
      }
    }
    
    document.querySelectorAll('.nav-links a, .nav-cta').forEach(link => {
      link.addEventListener('click', function() {
        const mobileMenu = document.getElementById('navMenu');
        const mobileToggle = document.getElementById('navToggle');
        if (mobileMenu) mobileMenu.classList.remove('active');
        if (mobileToggle) mobileToggle.classList.remove('active');
        document.body.classList.remove('mobile-nav-active');
      });
    });
    
    document.querySelectorAll('.dropdown > a').forEach(dropdownLink => {
      dropdownLink.addEventListener('click', function(e) {
        if (window.innerWidth <= 1024) {
          e.preventDefault();
          const dropdown = this.parentElement;
          dropdown.classList.toggle('active');
        }
      });
    });
    
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-links a').forEach(link => {
      const href = link.getAttribute('href');
      if (href === currentPage) {
        link.classList.add('active');
      }
    });
  }
  
  function initGlobalUI() {
    const scrollProgress = document.getElementById('scrollProgress');
    if (scrollProgress) {
      window.addEventListener('scroll', function() {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = (scrollTop / docHeight) * 100;
        scrollProgress.style.width = progress + '%';
      });
    }
    
    const backToTop = document.getElementById('backToTop');
    if (backToTop) {
      window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
          backToTop.classList.add('show');
        } else {
          backToTop.classList.remove('show');
        }
      });
      
      backToTop.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  }
  
  function initCounters() {
    const counters = document.querySelectorAll('.stat-number-lg');
    if (counters.length === 0) return;
    
    counters.forEach(counter => {
      const target = parseInt(counter.getAttribute('data-target'));
      if (isNaN(target)) return;
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            let current = 0;
            const increment = target / 50;
            const timer = setInterval(() => {
              current += increment;
              if (current >= target) {
                counter.innerText = target;
                clearInterval(timer);
              } else {
                counter.innerText = Math.floor(current);
              }
            }, 30);
            observer.unobserve(counter);
          }
        });
      }, { threshold: 0.5 });
      
      observer.observe(counter);
    });
  }
  
  async function loadAllComponents() {
    await loadComponent('navbar-container', 'components/navbar.html');
    await loadComponent('footer-container', 'components/footer.html');
    
    initNavbar();
    initGlobalUI();
    initCounters();
    renderProjects();
    initFilters();
    initLoadMore();
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadAllComponents);
  } else {
    loadAllComponents();
  }
  
  window.addEventListener('load', function() {
    const loader = document.getElementById('loader');
    if (loader) {
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }, 1000);
    }
  });
</script>
</body>
